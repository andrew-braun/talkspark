name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '24.15.0'
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate
              run: pnpm validate

            - name: Build
              run: pnpm build
              env:
                  OPENAI_API_KEY: dummy
